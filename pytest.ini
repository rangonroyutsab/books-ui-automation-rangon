[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --browser=chromium
    --screenshot=on
    --video=on
    --tracing=on
    --output=test-results
    --html=reports/html-report.html
    --self-contained-html
    --alluredir=allure-results

log_cli = true
log_cli_level = INFO

markers =
    smoke: quick homepage validation tests
    regression: complete regression test suite
    navigation: book navigation tests
    data: book data consistency tests
    links: broken link validation tests
    images: product image validation tests